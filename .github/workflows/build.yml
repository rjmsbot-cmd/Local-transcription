name: Build IPA
on: workflow_dispatch

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Xcode
        run: |
          # Use the latest available Xcode 16 if exact version not found
          if [ -d "/Applications/Xcode_16.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer
          elif [ -d "/Applications/Xcode_16.0.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.0.app/Contents/Developer
          else
            # Fallback: use whatever Xcode is installed
            ls /Applications/Xcode*.app || true
            sudo xcode-select -s /Applications/Xcode_16.0.app/Contents/Developer 2>/dev/null || true
          fi
          xcodebuild -version
          xcodebuild -showsdks 2>&1 | grep -i "iphoneos" | head -5

      - name: Install iOS Runtime
        run: |
          if ! xcodebuild -showsdks 2>/dev/null | grep -q "iphoneos"; then
            echo "iOS SDK not found, downloading..."
            xcodebuild -downloadPlatform iOS 2>&1 || true
          fi
          xcrun simctl list runtimes 2>/dev/null | head -5

      - name: Resolve packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project WhisperLocal.xcodeproj \
            -scheme WhisperLocal

      - name: Clean build folder
        run: |
          rm -rf build
          xcodebuild clean \
            -project WhisperLocal.xcodeproj \
            -scheme WhisperLocal \
            -configuration Release \
            -derivedDataPath build 2>&1 || true

      - name: Build for iOS
        run: |
          xcodebuild \
            -project WhisperLocal.xcodeproj \
            -scheme WhisperLocal \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            -allowProvisioningUpdates

      - name: Verify build output
        run: |
          echo "Build artifacts:"
          ls -la build/Build/Products/Release-iphoneos/
          test -d "build/Build/Products/Release-iphoneos/WhisperLocal.app" || (echo "App not found!" && exit 1)
          echo "Build verified successfully."

      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/WhisperLocal.app Payload/
          zip -r WhisperLocal.ipa Payload
          echo "IPA size: $(du -h WhisperLocal.ipa | cut -f1)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: WhisperLocal-IPA
          path: WhisperLocal.ipa
          retention-days: 14
