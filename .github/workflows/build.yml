name: Build IPA
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          if [ -d "/Applications/Xcode_16.2.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer
          elif [ -d "/Applications/Xcode_16.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer
          else
            ls -d /Applications/Xcode*.app 2>/dev/null || echo "No Xcode found"
            exit 1
          fi
          xcodebuild -version

      - name: Clean DerivedData
        run: |
          rm -rf ~/Library/Developer/Xcode/DerivedData/WhisperLocal*
          rm -rf .swiftpm .build

      - name: Build for iOS
        run: |
          xcodebuild \
            -project WhisperLocal.xcodeproj \
            -scheme WhisperLocal \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            ONLY_ACTIVE_ARCH=NO
        timeout-minutes: 25

      - name: Verify build output
        run: |
          ls -la build/Build/Products/Release-iphoneos/
          test -d "build/Build/Products/Release-iphoneos/WhisperLocal.app" || {
            echo "ERROR: App not found!"
            exit 1
          }

      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/WhisperLocal.app Payload/
          cd Payload && zip -r ../WhisperLocal.ipa WhisperLocal.app
          echo "IPA size: $(du -h WhisperLocal.ipa | cut -f1)"

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: WhisperLocal-IPA
          path: WhisperLocal.ipa
          retention-days: 14

      - name: Upload Build Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build/Logs/
          retention-days: 7
