name: Build IPA
on: workflow_dispatch

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Xcode 16.0
        run: |
          sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer
          xcodebuild -version
          xcodebuild -showsdks 2>&1 | grep -i "iphoneos" | head -5

      - name: Install iOS platform if needed
        run: |
          # Check if iphoneos SDK exists
          if ! xcodebuild -showsdks 2>/dev/null | grep -q "iphoneos"; then
            echo "iOS SDK not found, downloading..."
            xcodebuild -downloadPlatform iOS || true
          fi

      - name: Resolve packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project WhisperLocal.xcodeproj \
            -scheme WhisperLocal

      - name: Build for iOS
        run: |
          xcodebuild -project WhisperLocal.xcodeproj \
            -scheme WhisperLocal \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/WhisperLocal.app Payload/
          zip -r WhisperLocal.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: WhisperLocal-IPA
          path: WhisperLocal.ipa
