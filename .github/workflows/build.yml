name: Build IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode Version
        run: |
          # Try Xcode 16.2, fall back to 16.1, then 16.0
          if [ -d "/Applications/Xcode_16.2.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.2.app
          elif [ -d "/Applications/Xcode_16.1.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.1.app
          elif [ -d "/Applications/Xcode_16.0.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.0.app
          else
            echo "No compatible Xcode found"
            exit 1
          fi
          xcodebuild -version

      - name: Build for iOS Device
        run: |
          xcodebuild \
            -project WhisperLocal.xcodeproj \
            -scheme WhisperLocal \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            ONLY_ACTIVE_ARCH=NO \
            ENABLE_PREVIEWS=NO \
            archive \
            -archivePath build/WhisperLocal.xcarchive

      - name: Export IPA
        run: |
          # Create export options for ad-hoc distribution
          cat > exportOptions.plist << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>method</key>
              <string>development</string>
              <key>compileBitcode</key>
              <false/>
              <key>uploadSymbols</key>
              <false/>
              <key>signingStyle</key>
              <string>manual</string>
              <key>teamID</key>
              <string></string>
          </dict>
          </plist>
          
          xcodebuild \
            -exportArchive \
            -archivePath build/WhisperLocal.xcarchive \
            -exportPath build/export \
            -exportOptionsPlist exportOptions.plist \
            -allowProvisioningUpdates

      - name: Fallback Direct Build
        if: failure()
        run: |
          # Try direct build without archive
          xcodebuild \
            -project WhisperLocal.xcodeproj \
            -scheme WhisperLocal \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            ONLY_ACTIVE_ARCH=NO \
            ENABLE_PREVIEWS=NO

      - name: Verify build output
        run: |
          ls -la build/Build/Products/Release-iphoneos/ 2>/dev/null || echo "No direct build output"
          ls -la build/export/ 2>/dev/null || echo "No export output"

      - name: Create Valid IPA Structure
        run: |
          # Try to find the app
          if [ -d "build/export/WhisperLocal.app" ]; then
            APP_PATH="build/export/WhisperLocal.app"
          elif [ -d "build/Build/Products/Release-iphoneos/WhisperLocal.app" ]; then
            APP_PATH="build/Build/Products/Release-iphoneos/WhisperLocal.app"
          else
            echo "ERROR: App not found!"
            find build -name "*.app" -type d
            exit 1
          fi
          
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r WhisperLocal.ipa Payload
          echo "IPA size: $(du -h WhisperLocal.ipa | cut -f1)"

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WhisperLocal-IPA
          path: WhisperLocal.ipa
          retention-days: 14
