name: Build IPA
on: workflow_dispatch

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Xcode
        run: |
          # List available Xcode versions
          ls -d /Applications/Xcode*.app 2>/dev/null
          # Use Xcode 16.1 or 16.2 if available (they include iOS 18.1+ SDK)
          for ver in 16.2 16.1 16; do
            if [ -d "/Applications/Xcode_${ver}.app" ]; then
              sudo xcode-select -s "/Applications/Xcode_${ver}.app/Contents/Developer"
              echo "Selected Xcode ${ver}"
              break
            fi
          done
          xcodebuild -version
          xcodebuild -showsdks | grep iphoneos | head -5

      - name: Resolve packages
        run: |
          xcodebuild -resolvePackageDependencies \
            -project WhisperLocal.xcodeproj \
            -scheme WhisperLocal

      - name: Build for iOS
        run: |
          xcodebuild -project WhisperLocal.xcodeproj \
            -scheme WhisperLocal \
            -sdk iphoneos \
            -destination 'generic/platform=iOS' \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/WhisperLocal.app Payload/
          zip -r WhisperLocal.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: WhisperLocal-IPA
          path: WhisperLocal.ipa
