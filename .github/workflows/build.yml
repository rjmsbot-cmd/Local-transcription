name: Build IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: List available Xcode versions
        run: |
          ls /Applications/Xcode*.app 2>/dev/null || echo "No Xcode apps found"
          xcode-select -p

      - name: Select Xcode Version
        run: |
          # Try Xcode 16.2, fall back to 16.1, then 16.0
          if [ -d "/Applications/Xcode_16.2.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.2.app
          elif [ -d "/Applications/Xcode_16.1.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.1.app
          elif [ -d "/Applications/Xcode_16.0.app" ]; then
            sudo xcode-select -s /Applications/Xcode_16.0.app
          else
            echo "No compatible Xcode found"
            exit 1
          fi
          xcodebuild -version

      - name: Build for iOS
        run: |
          xcodebuild \
            -project WhisperLocal.xcodeproj \
            -scheme WhisperLocal \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build \
            -destination 'generic/platform=iOS' \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            ONLY_ACTIVE_ARCH=NO \
            ENABLE_PREVIEWS=NO

      - name: Verify build output
        run: |
          ls -la build/Build/Products/Release-iphoneos/
          test -d "build/Build/Products/Release-iphoneos/WhisperLocal.app" || {
            echo "ERROR: App not found!"
            exit 1
          }

      - name: Create Valid IPA Structure
        run: |
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/WhisperLocal.app Payload/
          zip -r WhisperLocal.ipa Payload
          echo "IPA size: $(du -h WhisperLocal.ipa | cut -f1)"

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WhisperLocal-IPA
          path: WhisperLocal.ipa
          retention-days: 14
