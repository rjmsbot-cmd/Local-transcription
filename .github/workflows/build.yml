name: Build IPA
on: workflow_dispatch

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer
          xcodebuild -version
          # Check available simulator runtimes
          xcrun simctl list runtimes 2>/dev/null | head -10
          # Check SDK
          ls /Applications/Xcode_16.app/Contents/Developer/Platforms/iPhoneOS.platform/Developer/SDKs/

      - name: Install iOS Runtime
        run: |
          # Try to install the iOS 18.0 runtime
          xcodebuild -downloadPlatform iOS 2>&1 || true
          # Check again
          xcrun simctl list runtimes 2>/dev/null | head -5

      - name: Resolve packages
        run: xcodebuild -resolvePackageDependencies -project WhisperLocal.xcodeproj -scheme WhisperLocal

      - name: Build for iOS
        run: |
          # Build for device (unsigned)
          xcodebuild -project WhisperLocal.xcodeproj \
            -scheme WhisperLocal \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            -allowProvisioningUpdates

      - name: Create IPA
        run: |
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/WhisperLocal.app Payload/
          zip -r WhisperLocal.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: WhisperLocal-IPA
          path: WhisperLocal.ipa
