name: Build IPA

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-15
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Select Xcode Version
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: '16.2' # Selecciona automáticamente Xcode 16.2 o la versión de Xcode 16 disponible

      - name: Clean DerivedData and Build Cache
        run: |
          rm -rf ~/Library/Developer/Xcode/DerivedData/WhisperLocal*
          rm -rf .swiftpm .build build

      - name: Build for iOS (Ad-Hoc/Unsigned)
        run: |
          xcodebuild \
            -project WhisperLocal.xcodeproj \
            -scheme WhisperLocal \
            -sdk iphoneos \
            -configuration Release \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="-" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            COMPILER_INDEX_STORE_ENABLE=NO \
            ONLY_ACTIVE_ARCH=NO
        timeout-minutes: 25

      - name: Verify build output
        run: |
          ls -la build/Build/Products/Release-iphoneos/
          test -d "build/Build/Products/Release-iphoneos/WhisperLocal.app" || {
            echo "ERROR: App not found!"
            exit 1
          }

      - name: Create Valid IPA Structure
        run: |
          mkdir -p Payload
          cp -r build/Build/Products/Release-iphoneos/WhisperLocal.app Payload/
          zip -r WhisperLocal.ipa Payload
          echo "IPA size: $(du -h WhisperLocal.ipa | cut -f1)"

      - name: Upload IPA Artifact
        uses: actions/upload-artifact@v4
        with:
          name: WhisperLocal-IPA
          path: WhisperLocal.ipa
          retention-days: 14

      - name: Upload Build Logs (If Failed)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: build/Logs/
          retention-days: 7
          if-no-files-found: ignore
